x-common-jwt: &common-jwt
  Jwt__Issuer: TrueCode
  Jwt__Audience: TrueCodeClients
  Jwt__AccessTokenMinutes: 15
  Jwt__RefreshTokenDays: 7
  Jwt__SecretKey: docker-development-secret-key-change-me-please-32+

x-common-seq: &common-seq
  Seq__ServerUrl: http://seq:5341

x-api-healthcheck: &api-healthcheck
  test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  seq:
    image: datalust/seq:2024.3
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migration-service:
    build:
      context: .
      dockerfile: src/Services/MigrationService/TrueCodeExample.MigrationService/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__UsersDb: Host=postgres;Port=5432;Database=truecode_users;Username=postgres;Password=postgres
      ConnectionStrings__FinanceDb: Host=postgres;Port=5432;Database=truecode_finance;Username=postgres;Password=postgres
      <<: *common-seq
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    restart: "no"

  users-api:
    build:
      context: .
      dockerfile: src/Services/Users/TrueCodeExample.Users.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__UsersDb: Host=postgres;Port=5432;Database=truecode_users;Username=postgres;Password=postgres
      <<: [*common-jwt, *common-seq]
    healthcheck: *api-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      migration-service:
        condition: service_completed_successfully
    restart: unless-stopped

  finance-api:
    build:
      context: .
      dockerfile: src/Services/Finance/TrueCodeExample.Finance.Api/Dockerfile
    ports:
      - "5200:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__FinanceDb: Host=postgres;Port=5432;Database=truecode_finance;Username=postgres;Password=postgres
      <<: [*common-jwt, *common-seq]
    healthcheck: *api-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      migration-service:
        condition: service_completed_successfully
    restart: unless-stopped

  currency-worker:
    build:
      context: .
      dockerfile: src/Services/Finance/TrueCodeExample.Finance.CurrencyWorker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__FinanceDb: Host=postgres;Port=5432;Database=truecode_finance;Username=postgres;Password=postgres
      CurrencyWorker__SyncIntervalMinutes: 60
      Cbr__BaseUrl: http://www.cbr.ru
      <<: *common-seq
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      migration-service:
        condition: service_completed_successfully
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/TrueCodeExample.Gateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      <<: *common-seq
    healthcheck: *api-healthcheck
    depends_on:
      seq:
        condition: service_started
      users-api:
        condition: service_healthy
      finance-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  seq_data:
